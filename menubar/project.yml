name: klingeLING
options:
  bundleIdPrefix: digital.freise
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

targets:
  klingeLING:
    type: application
    platform: macOS
    sources:
      - klingeLING
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: digital.freise.klingeling
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        INFOPLIST_KEY_LSUIElement: true
        CODE_SIGN_ENTITLEMENTS: klingeLING/Resources/klingeLING.entitlements
        SWIFT_STRICT_CONCURRENCY: targeted
        GENERATE_INFOPLIST_FILE: true
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: false
    entitlements:
      path: klingeLING/Resources/klingeLING.entitlements
